{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block auth_content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo"><i class="bi bi-key"></i></div>
            <h2>Forgot Password</h2>
            <p>This feature will be available soon. Please contact your system administrator to reset your password.</p>
        </div>
        <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100">
            <i class="bi bi-arrow-left me-2"></i>Back to Login
        </a>
    </div>
</div>
{% endblock %}
